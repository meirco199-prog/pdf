name: Build Windows Installer

on:
  workflow_dispatch:        # allow manual runs from the Actions tab
  push:
    tags:
      - 'v*'                 # pushing a tag like v1.0.0 builds AND publishes a Release

permissions:
  contents: write           # needed to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stage web app into desktop/app
        shell: bash
        run: |
          mkdir -p desktop/app
          cp index.html service-worker.js manifest.webmanifest desktop/app/ 2>/dev/null || true
          cp icon-192.png icon-512.png icon-maskable-192.png icon-maskable-512.png favicon-64.png apple-touch-icon.png desktop/app/ 2>/dev/null || true
          ls -la desktop/app

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build installer (electron-builder)
        working-directory: desktop
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Editor-Windows-Installer
          path: desktop/dist/*.exe
          if-no-files-found: error

      - name: Publish Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" desktop/dist/*.exe \
            --title "עורך PDF — התקנה ל-Windows (${GITHUB_REF_NAME})" \
            --notes "קובץ ההתקנה של עורך ה-PDF ל-Windows. הורידו את קובץ ה-.exe והריצו אותו כדי להתקין. לאחר ההתקנה קובצי PDF יכולים להיפתח ישירות בתוכנה (קליק ימני → פתח באמצעות → עורך PDF)."
