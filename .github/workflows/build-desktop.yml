name: Build Windows Installer

on:
  workflow_dispatch:        # run manually from the Actions tab
    inputs:
      version:
        description: 'Release tag to publish'
        required: false
        default: 'v1.0.0'
  push:
    tags:
      - 'v*'                 # pushing a tag like v1.0.0 also builds + publishes
    branches:
      - main                 # build when the desktop app or the editor changes
    paths:
      - 'desktop/**'
      - 'index.html'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: write           # needed to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stage web app into desktop/app
        shell: bash
        run: |
          mkdir -p desktop/app
          cp index.html service-worker.js manifest.webmanifest desktop/app/ 2>/dev/null || true
          cp icon-192.png icon-512.png icon-maskable-192.png icon-maskable-512.png favicon-64.png apple-touch-icon.png desktop/app/ 2>/dev/null || true
          ls -la desktop/app

      - name: Install dependencies
        working-directory: desktop
        run: npm install

      - name: Build installer (electron-builder)
        working-directory: desktop
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List packaged app (diagnostic)
        working-directory: desktop
        shell: bash
        run: |
          echo "=== dist/win-unpacked/resources ==="
          ls -la dist/win-unpacked/resources || true
          echo "=== dist/win-unpacked/resources/app ==="
          ls -la dist/win-unpacked/resources/app || true
          echo "=== resources/app/app (web files) ==="
          ls -la dist/win-unpacked/resources/app/app || true

      - name: Upload installer as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Editor-Windows-Installer
          path: desktop/dist/*.exe
          if-no-files-found: error

      - name: Publish / refresh Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ github.event.inputs.version }}"
          if [ -z "$TAG" ]; then TAG="v1.0.0"; fi
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then TAG="$GITHUB_REF_NAME"; fi
          NOTES="קובץ ההתקנה של עורך ה-PDF ל-Windows. הורידו את קובץ ה-.exe והריצו אותו. במסך אזהרה של Windows: לחצו \"מידע נוסף\" ואז \"הפעל בכל זאת\". לאחר ההתקנה אפשר לפתוח PDF בתוכנה דרך קליק ימני → פתח באמצעות → עורך PDF."
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" desktop/dist/*.exe --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" desktop/dist/*.exe \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "עורך PDF — התקנה ל-Windows ($TAG)" \
              --notes "$NOTES"
          fi
